services:
  # Base de données MySQL
  db:
    image: mysql:8.0
    container_name: site-asso-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Migration Prisma (s'exécute une fois puis se termine)
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: migrate
    container_name: site-asso-migrate
    restart: no
    environment:
      DATABASE_URL: mysql://${MYSQL_USER}:${MYSQL_PASSWORD}@db:3306/${MYSQL_DATABASE}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network

  # Application Next.js
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${NAME}
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.${NAME}.entryPoints=websecure"
      - "traefik.http.services.${NAME}.loadbalancer.server.port=3000"
      - "traefik.http.routers.${NAME}.rule=Host(`${NAME}.jrcan.dev`)"
      - "traefik.http.routers.${NAME}.tls=true"
      - "traefik.http.routers.${NAME}.tls.certresolver=myresolver"
    environment:
      DATABASE_URL: mysql://${MYSQL_USER}:${MYSQL_PASSWORD}@db:3306/${MYSQL_DATABASE}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      AUTH_TRUST_HOST: "true"
      SUMUP_API_KEY: ${SUMUP_API_KEY}
      SUMUP_MERCHANT_CODE: ${SUMUP_MERCHANT_CODE}
      NODE_ENV: production
    volumes:
      - ./public/uploads:/app/public/uploads
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - app-network
      - web

  # phpMyAdmin
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: site-asso-phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.${NAME}-pma.entryPoints=websecure"
      - "traefik.http.services.${NAME}-pma.loadbalancer.server.port=80"
      - "traefik.http.routers.${NAME}-pma.rule=Host(`phpmyadmin-${NAME}.jrcan.dev`)"
      - "traefik.http.routers.${NAME}-pma.tls=true"
      - "traefik.http.routers.${NAME}-pma.tls.certresolver=myresolver"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network
      - web

networks:
  app-network:
    driver: bridge
  web:
    external: true

volumes:
  mysql-data:
    driver: local